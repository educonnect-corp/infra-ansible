# EduConnect Corp — Infrastructure Inventory
# Ansible 2.14 — last updated: 2024-09-01
# Maintainer: s.kone@educonnect-corp.xyz
# Migration plan d'adressage complétée — ticket #512 DONE

all:
  vars:
    ansible_python_interpreter: /usr/bin/python3

  children:

    dmz:
      vars:
        network: 10.20.0.0/24
        firewall: pf-dmz
      hosts:
        web01:
          ansible_host: 10.20.0.10
          ansible_user: www-data
          os: Debian 12
          services: [apache/2.4.54, php/7.4.33, mysql-client/5.7]
          ports: [80, 443]
          notes: "Portail étudiant — accessible depuis Internet"
        mail01:
          ansible_host: 10.20.0.20
          ansible_user: postfix
          os: Debian 12
          services: [postfix/3.7.4, apache/2.4.57, php/8.2]
          ports: [25, 80]
          notes: "Webmail + SMTP — accessible depuis Internet"

    lan:
      vars:
        network: 10.21.0.0/24
        firewall: pf-lan
        notes: "Réseau interne — non routable depuis Internet"
      hosts:
        dev01:
          ansible_host: 10.21.0.20
          ansible_user: jenkins
          os: Debian 11
          services: [jenkins/2.426.1-lts]
          ports: [8080, 50000]
          notes: "Serveur CI/CD — accès interne uniquement"
        files01:
          ansible_host: 10.21.0.30
          ansible_user: smbadmin
          os: Debian 12
          services: [samba/4.17.5]
          ports: [139, 445]
          shares: [Public, Admin/RH, Admin/Finance, Admin/Technique]
          notes: "Serveur de fichiers — accès par rôle"

    admin_net:
      vars:
        network: 10.22.0.0/24
        firewall: pf-admin
        notes: "Réseau administration — pivot requis depuis LAN"
      hosts:
        admin01:
          ansible_host: 10.22.0.10
          os: Debian 12
          services: [python/3.11, flask/3.0]
          ports: [8443]
          notes: "Panel admin interne — auth requise"
        dev01:
          ansible_host: 10.22.0.20
          notes: "dual-homed LAN + ADMIN — voir entrée dans lan"

    core:
      vars:
        network: 10.23.0.0/24
        firewall: pf-core
        notes: "Réseau CORE — accès restreint ops uniquement"
      hosts:
        db01:
          ansible_host: 10.23.0.10
          os: Debian 12
          services: [mongodb/7.0.2, redis/7.0.11]
          ports: [27017, 6379, 6380]
          notes: "Base de données principale — MongoDB sans auth (ticket #445 pending)"
        root01:
          ansible_host: 10.23.0.30
          ansible_user: root
          os: Debian 12
          services: [openssh/9.0]
          ports: [22]
          notes: "Serveur archives contractuelles — accès ops seulement"
